# This is a basic workflow that is manually triggered

name: Update sha256

on:
  repository_dispatch:
    types: [trigger-workflow]

jobs:
  update_sha256_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config --global user.name "PeterSuh-Q3"
          git config --global user.email dante9000@gmail.com

      # ------------------------------------------------------------------ #
      # arpl-modules latest 릴리즈에서 파일 다운로드 후 교체
      #
      # 다운로드 대상:
      #   1) 플랫폼명-DSM버전-커널버전.tgz  (예: apollolake-7.2-4.4.302.tgz)
      #   2) 플랫폼명-DSM버전.json          (예: apollolake-7.2.json)
      #
      # 저장 경로: ${ROOT_PATH}/all-modules/releases/
      # 소스 repo: https://github.com/PeterSuh-Q3/arpl-modules
      # ------------------------------------------------------------------ #
      - name: Download latest tgz and json from arpl-modules
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SRC_REPO: PeterSuh-Q3/arpl-modules
        run: |
          set -euo pipefail

          ROOT_PATH=${{ github.workspace }}
          DEST="${ROOT_PATH}/all-modules/releases"
          mkdir -p "${DEST}"

          BASE_URL="https://github.com/${SRC_REPO}/releases/latest/download"

          echo "=== arpl-modules latest 릴리즈 태그 조회 ==="
          LATEST_TAG=$(gh release view --repo "${SRC_REPO}" --json tagName -q '.tagName')
          echo "Latest tag: ${LATEST_TAG}"

          echo ""
          echo "=== 릴리즈 asset 목록 조회 ==="
          ALL_ASSETS=$(gh release view "${LATEST_TAG}" \
            --repo "${SRC_REPO}" \
            --json assets \
            -q '.assets[].name')
          echo "${ALL_ASSETS}"

          # ---- 1) 플랫폼 tgz 파일 다운로드 --------------------------------
          # 패턴: {소문자+숫자}-{X.Y}-{커널버전}.tgz
          # 제외: firmware.tgz, firmwarei915.tgz 등
          #echo ""
          #echo "=== tgz 파일 다운로드 → ${DEST} ==="
          #TGZ_LIST=$(echo "${ALL_ASSETS}" \
          #  | grep -E '^[a-z0-9]+-[0-9]+\.[0-9]+-[0-9]+.*\.tgz$' || true)
          #if [ -z "${TGZ_LIST}" ]; then
          #  echo "::warning::다운로드할 플랫폼 tgz 파일이 없습니다."
          #else
          #  while IFS= read -r FNAME; do
          #    [ -z "${FNAME}" ] && continue
          #    echo "  다운로드: ${FNAME}"
          #    curl -fsSL "${BASE_URL}/${FNAME}" -o "${DEST}/${FNAME}"
          #  done <<< "${TGZ_LIST}"
          #fi

          # ---- 2) 플랫폼 json 파일 다운로드 --------------------------------
          # arpl-modules repo main 브랜치 루트의 {platform}-{X.Y}.json 목록을
          # GitHub API로 조회한 뒤 raw URL로 다운로드
          echo ""
          echo "=== json 파일 다운로드 → ${DEST} ==="
          JSON_LIST=$(gh api \
            "repos/${SRC_REPO}/contents/" \
            --jq '.[].name | select(test("^[a-z0-9]+-[0-9]+\\.[0-9]+\\.json$"))' \
            2>/dev/null || true)

          if [ -z "${JSON_LIST}" ]; then
            echo "::warning::다운로드할 json 파일이 없습니다."
          else
            RAW_BASE="https://raw.githubusercontent.com/${SRC_REPO}/main"
            while IFS= read -r JNAME; do
              [ -z "${JNAME}" ] && continue
              echo "  다운로드: ${JNAME}"
              curl -fsSL "${RAW_BASE}/${JNAME}" -o "${DEST}/${JNAME}"
            done <<< "${JSON_LIST}"
          fi

          echo ""
          echo "=== 다운로드 완료 목록 ==="
          ls -1 "${DEST}"
          date > "${ROOT_PATH}/all-modules/date.log"

      - name: Commit and push changes
        run: |
          git add .
          git diff --cached --quiet && echo "변경 없음, 커밋 생략" && exit 0
          git commit -m "update sha256 for platform.json"
          git push
